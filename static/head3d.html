<!DOCTYPE html>
<html>
<head>
  <title>3D Head Tracking</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body style="margin:0; background:black; overflow:hidden;">

<script>
// =========================
// Three.js Scene Setup
// =========================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Cube = represents head orientation
const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
const material = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

camera.position.z = 3;

// =========================
// WebSocket Connection
// =========================
const socket = io();

// Listen for AirPods state updates
socket.on("state", (data) => {
    if (data.head && data.head.orientation) {
        const o = data.head.orientation;
        // Scale rotations for visualization
        cube.rotation.x = o[0] / 1000;
        cube.rotation.y = o[1] / 1000;
        cube.rotation.z = o[2] / 1000;
    }
});

// =========================
// Handle window resize
// =========================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}, false);

// =========================
// Animation Loop
// =========================
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
